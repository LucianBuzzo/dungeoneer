<!DOCTYPE html><html class=no-js lang><meta charset=utf-8><meta http-equiv=x-ua-compatible content="ie=edge"><title>Dungeoneer</title><meta name=description content><meta name=viewport content="width=device-width, initial-scale=1"><style>html,body{background:#000}canvas{image-rendering:pixelated;margin:100px auto;display:block}#dice-svg svg{cursor:pointer;width:80px;margin-left:auto;margin-right:auto;display:block}#dice-svg svg.mousedown{padding-top:1px}#dice-svg svg:hover{animation:.82s cubic-bezier(.36,.07,.19,.97) both wiggle}#seed{color:#fff;text-align:center;margin-top:-75px;margin-bottom:20px;font-family:monospace}#controls{color:#fff;background:#ffffff14;border:1px solid #fff3;border-radius:8px;width:min(900px,100vw - 40px);margin:0 auto 24px;padding:12px;font-family:monospace}#controls h3{margin:6px 0 10px}#controls .row{flex-wrap:wrap;gap:8px;margin-bottom:10px;display:flex}#controls button{color:#fff;cursor:pointer;background:#ffffff26;border:1px solid #ffffff59;border-radius:6px;padding:4px 8px;font-family:monospace}#controls button:hover{background:#ffffff40}#seed-history{margin-top:8px}#seed-history button{opacity:.9;font-size:11px}#controls .grid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px 12px;display:grid}#controls label{justify-content:space-between;align-items:center;gap:8px;display:flex}#controls input[type=number],#controls input[type=text]{width:90px}#controls .checkbox{justify-content:flex-start;gap:6px}#stats{color:#c7ffdb;margin-top:10px}@keyframes wiggle{10%,90%{transform:rotate(-2deg)}20%,80%{transform:rotate(0)}30%,50%,70%{transform:rotate(2deg)}40%,60%{transform:rotate(-2deg)}}</style><body>

    <canvas></canvas>
    <div id=seed></div>

    <div id=controls>
      <h3>Demo Controls</h3>
      <div id=presets class=row>
        <button type=button data-preset=classic>Classic</button>
        <button type=button data-preset=dense>Dense</button>
        <button type=button data-preset=sparse>Sparse</button>
        <button type=button data-preset=labyrinth>Labyrinth</button>
        <button type=button data-preset=secret-heavy>Secret-heavy</button>
      </div>
      <div class=grid>
        <label>Width <input id=width type=number min=5 max=151 step=2 value=51></label>
        <label>Height <input id=height type=number min=5 max=151 step=2 value=51></label>
        <label class=checkbox><input id=use-seed type=checkbox>Use seed</label>
        <label>Seed <input id=seed-input placeholder=foobarbaz></label>

        <label class=checkbox><input id=show-region-colors type=checkbox>Color by region tags</label>
        <label class=checkbox><input id=plugin-chokes type=checkbox>Plugin: addChokePoints</label>
        <label class=checkbox><input id=plugin-secrets type=checkbox>Plugin: addSecrets</label>
        <label class=checkbox><input id=plugin-regions type=checkbox>Plugin: addRegionTags</label>

        <label>minRooms <input id=minRooms type=number min=1 step=1></label>
        <label>maxRooms <input id=maxRooms type=number min=1 step=1></label>
        <label>minRoomSize <input id=minRoomSize type=number min=1 step=1></label>
        <label>maxRoomSize <input id=maxRoomSize type=number min=1 step=1></label>
        <label>maxDeadEnds <input id=maxDeadEnds type=number min=0 step=1></label>

        <label>choke inverseChance <input id=chokeInverse type=number min=1 step=1 value=8></label>
        <label>choke maxCount <input id=chokeMax type=number min=1 step=1 value=12></label>
        <label>secrets inverseChance <input id=secretsInverse type=number min=1 step=1 value=12></label>
        <label>secrets maxCount <input id=secretsMax type=number min=1 step=1 value=8></label>
      </div>
      <div id=stats></div>
      <div id=seed-history class=row></div>
    </div>
